name: Build HyperTizen (.tpk)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Boot into a pure .NET 6 environment
    container: mcr.microsoft.com/dotnet/sdk:6.0

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Unzip
      # The Microsoft container doesn't have unzip by default, so we install it here
      run: |
        apt-get update
        apt-get install -y unzip curl

    - name: Inject Samsung Manifests and Install Tizen
      run: |
        # Download and extract the manifest (now that unzip is installed)
        curl -sSL https://raw.githubusercontent.com/Samsung/Tizen.NET/main/workload/scripts/workload-install.sh | bash
        
        # Install the Tizen framework
        dotnet workload install tizen

    - name: Build HyperTizen
      run: dotnet build HyperTizen/HyperTizen.csproj -c Release

    - name: Upload TPK File
      uses: actions/upload-artifact@v4
      with:
        name: HyperTizen-App
        path: "**/*.tpk"
