name: Build HyperTizen (.tpk)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 1. Boot into a pure .NET 6 environment (No .NET 10 interference)
    container: mcr.microsoft.com/dotnet/sdk:6.0

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Inject Samsung Manifests and Install Tizen
      run: |
        # 2. Download Samsung's official script and run it (without sudo, since we are root)
        curl -sSL https://raw.githubusercontent.com/Samsung/Tizen.NET/main/workload/scripts/workload-install.sh | bash
        
        # 3. Now the system 100% knows what Tizen is. Install it.
        dotnet workload install tizen

    - name: Build HyperTizen
      run: dotnet build HyperTizen/HyperTizen.csproj -c Release

    - name: Upload TPK File
      uses: actions/upload-artifact@v4
      with:
        name: HyperTizen-App
        path: "**/*.tpk"
